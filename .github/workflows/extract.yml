name: Extract Indonesia Street Names

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install duckdb matplotlib shapely numpy pandas

      - name: Run extraction
        run: python extract.py

      - name: Show row count
        run: python3 -c "import duckdb; print(duckdb.query('SELECT count(*) FROM read_parquet(\'indonesia_streets.parquet\')').fetchone()[0], 'rows')"

      - name: Generate map
        run: python visualize.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add indonesia_streets.parquet map.png
          git diff --staged --quiet || git commit -m "update dataset + map [$(date -u +%Y-%m-%d)]"
          git push
