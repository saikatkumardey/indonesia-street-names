name: Extract Indonesia Street Names

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync

      - name: Run extraction
        run: uv run python scripts/extract.py

      - name: Show row count
        run: uv run python -c "import duckdb; print(duckdb.query('SELECT count(*) FROM read_parquet(\'data/indonesia_streets.parquet\')').fetchone()[0], 'rows')"

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/indonesia_streets.parquet data/sample.csv
          git diff --staged --quiet || git commit -m "update dataset [$(date -u +%Y-%m-%d)]"
          git pull --rebase origin main
          git push
