name: Regenerate Sample

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sample:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync

      - name: Regenerate sample
        run: uv run python scripts/extract.py sample

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sample.csv
          git diff --staged --quiet || git commit -m "regenerate sample.csv [$(date -u +%Y-%m-%d)]"
          git pull --rebase --autostash origin main
          git push
