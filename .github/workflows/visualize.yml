name: Generate Map

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Extract Indonesia Street Names"]
    types: [completed]

permissions:
  contents: write

jobs:
  visualize:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync

      - name: Generate map
        run: uv run python visualize.py

      - name: Commit map
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add map.png
          git diff --staged --quiet || git commit -m "update map.png [$(date -u +%Y-%m-%d)]"
          git push
